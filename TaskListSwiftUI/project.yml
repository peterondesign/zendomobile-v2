name: TaskListSwiftUI
options:
  minimumXcodeGenVersion: 2.37.0
targets:
  TaskListSwiftUI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Task List
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zendomobile.tasklist
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: 1
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
schemes:
  TaskListSwiftUI:
    build:
      targets:
        TaskListSwiftUI: all
